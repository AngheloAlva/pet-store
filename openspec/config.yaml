schema: spec-driven

context: |
  SimplePet — E-commerce vertical para tiendas de mascotas en Chile.
  Stack: Next.js 16 App Router, React 19, TypeScript 5, Tailwind 4, shadcn "base-luma" (Base UI, NOT Radix), Zustand 5, Phosphor icons.
  Data: seed estática en src/data/* tipada con src/types/*.
  Patterns: RSC por defecto, client components solo cuando hay interactividad. Composición Base UI vía prop `render`, nunca `asChild`.
  Testing: no test runner configurado aún.

strict_tdd: false

rules:
  proposal:
    - Include rollback plan for risky changes
    - Identify affected modules/packages
  specs:
    - Use Given/When/Then format for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group tasks by phase (infrastructure, implementation, testing)
    - Use hierarchical numbering (1.1, 1.2, etc.)
    - Keep tasks small enough to complete in one session
  apply:
    - Follow existing code patterns and conventions
    - Load relevant coding skills for the project stack
    - Base UI: use `render={<Element />}`, never `asChild`
  verify:
    - Run lint (pnpm lint) and tsc as no test runner exists
    - Compare implementation against every spec scenario
  archive:
    - Warn before merging destructive deltas (large removals)

testing:
  strict_tdd: false
  reason: "No test runner installed (no vitest/jest in package.json)"
  test_runner:
    framework: none
    command: null
  layers:
    unit: { available: false, tool: null }
    integration: { available: false, tool: null }
    e2e: { available: false, tool: null }
  coverage: { available: false, command: null }
  quality:
    linter: { available: true, command: "pnpm lint" }
    type_checker: { available: true, command: "pnpm exec tsc --noEmit" }
    formatter: { available: false, command: null }
